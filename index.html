<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar'ın İntikamı: v1.19.1 (Red LED Edition)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 12px; color: rgba(255, 255, 255, 0.4); pointer-events: none; z-index: 10; font-family: monospace; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 50px; margin: 10px; box-shadow: 0 0 15px #2ecc71; transition: 0.3s; }
        #subtitle-panel { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 750px; background: rgba(0, 0, 0, 0.9); border-left: 5px solid #00d2ff; border-right: 5px solid #00d2ff; padding: 20px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: 900; min-height: 35px; z-index: 5; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .ui-top { position: absolute; top: 10px; left: 10px; z-index: 5; pointer-events: none; }
        .stats { font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 2px solid #00d2ff; min-width: 220px; }
        .bar-label { font-size: 10px; color: #aaa; margin-top: 5px; display: block; font-weight: bold; }
        .bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 2px; border: 1px solid #444; }
        #dash-bar { width: 100%; height: 100%; background: #9b59b6; }
    </style>
</head>
<body>
    <div id="version-tag">v1.19.1 | LED'Lİ MAYINLAR</div>
    <div id="startScreen" class="overlay">
        <h1 style="color:#ff4757; font-size: 50px; text-shadow: 0 0 20px #ff4757;">RÜZGAR'IN İNTİKAMI</h1>
        <p style="font-size: 18px; color: #ccc;">Kırmızı LED yanıyorsa... Kaçış yok!</p>
        <button class="btn" onclick="init()">MEVZUYA GİR</button>
    </div>
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; font-size: 60px;">PAKET OLDUN!</h1>
        <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
    </div>
    
    <div id="subtitle-panel">SİSTEM HAZIR...</div>
    
    <div class="ui-top">
        <div class="stats">
            SKOR: <b id="score">0</b> | LEVEL: <b id="ui-level">1</b><br>
            <span class="bar-label">DASH (SHIFT / SAĞ TIK)</span>
            <div class="bar-bg"><div id="dash-bar"></div></div>
            <span class="bar-label">MAYIN HAKKI (SOL TIK): <b id="mine-count" style="color:#ff4757">5</b></span>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const subtitle = document.getElementById("subtitle-panel");
        const dashBar = document.getElementById("dash-bar");
        const mineText = document.getElementById("mine-count");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, level = 1, speedMult = 1;
        let bullets = [], particles = [], hunters = [], enemyBullets = [], mines = [];
        let mouseX = 0, mouseY = 0, ammoReload = 100, dashEnergy = 100, isDashing = false, shakeAmount = 0;
        
        const player = { x: canvas.width/2, y: canvas.height/2, size: 20, color: "#00d2ff", invul: 0, speedDebuff: 1 };

        const templates = [
            { name: "Tank Mert Hoca", color: "#c0392b", speed: 0.5, hp: 3, size: 55 },
            { name: "Kutay (Ghost)", color: "#ffa502", speed: 2.2, hp: 1, size: 30, ghostTimer: 0, isGhost: false },
            { name: "Cansu Hoca", color: "#ff00ff", speed: 2.1, hp: 1, size: 32, auraRadius: 150 },
            { name: "Zeki Emre", color: "#8e44ad", speed: 1.8, hp: 1, size: 35 },
            { name: "Işınlanan Ali", color: "#5352ed", speed: 1.6, hp: 1, size: 28, tpTimer: 0 }
        ];

        function setSubtitle(text, color = "#fff", border = "#00d2ff") {
            subtitle.innerText = text;
            subtitle.style.color = color;
            subtitle.style.borderColor = border;
        }

        function init() {
            document.getElementById("startScreen").style.display = "none";
            hunters = templates.map(t => ({ ...t, x: Math.random()*canvas.width, y: -100, maxHp: t.hp, hp: t.hp, dead: false, specialTimer: Date.now(), ghostTimer: Date.now(), tpTimer: Date.now() }));
            gameActive = true;
            gameLoop();
        }

        function performDash() {
            if (dashEnergy < 40 || isDashing) return;
            isDashing = true; dashEnergy -= 40; player.invul = 15;
            const angle = Math.atan2(player.y - mouseY, player.x - mouseX);
            player.x += Math.cos(angle) * 160; player.y += Math.sin(angle) * 160;
            shakeAmount = 10;
            setTimeout(() => { isDashing = false; }, 300);
        }

        window.addEventListener("mousemove", e => { 
            if(!gameActive || isDashing) return;
            mouseX = e.clientX; mouseY = e.clientY;
            player.x += (mouseX - player.x) * 0.15 * player.speedDebuff;
            player.y += (mouseY - player.y) * 0.15 * player.speedDebuff;
        });

        window.addEventListener("mousedown", e => { 
            if(e.button === 0 && mines.length < 5) {
                mines.push({x: player.x, y: player.y});
                setSubtitle("RÜZGAR: KIRMIZI YANDI, İŞİN BİTTİ!", "#ff4757", "#ff4757");
            }
            if(e.button === 2) performDash();
        });

        window.addEventListener("keydown", e => {
            if(e.key === "Shift") performDash();
            if(e.key.startsWith("Arrow") && ammoReload >= 100) {
                let vx=0, vy=0;
                if(e.key==="ArrowUp") vy=-15; if(e.key==="ArrowDown") vy=15;
                if(e.key==="ArrowLeft") vx=-15; if(e.key==="ArrowRight") vx=15;
                bullets.push({x: player.x, y: player.y, vx, vy});
                ammoReload = 0;
            }
        });

        window.oncontextmenu = (e) => e.preventDefault();

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0, color });
            }
        }

        function update() {
            const currentTime = Date.now();
            if(dashEnergy < 100) dashEnergy += 0.4;
            if(ammoReload < 100) ammoReload += 1.6;
            dashBar.style.width = dashEnergy + "%";
            mineText.innerText = (5 - mines.length);
            if(player.invul > 0) player.invul--;
            if(shakeAmount > 0) shakeAmount *= 0.9;

            player.speedDebuff = 1;

            hunters.forEach(h => {
                if(h.dead) return;

                if (h.name === "Işınlanan Ali" && currentTime - h.tpTimer > 6000) {
                    h.x = player.x + (Math.random()-0.5)*300; h.y = player.y + (Math.random()-0.5)*300;
                    h.tpTimer = currentTime;
                }

                if (h.name === "Kutay (Ghost)") {
                    let elapsed = currentTime - h.ghostTimer;
                    if (!h.isGhost && elapsed > 10000) { h.isGhost = true; h.ghostTimer = currentTime; }
                    else if (h.isGhost && elapsed > 5000) { h.isGhost = false; h.ghostTimer = currentTime; }
                }

                if (h.name === "Cansu Hoca") {
                    if (Math.hypot(player.x - h.x, player.y - h.y) < h.auraRadius) player.speedDebuff = 0.6;
                }

                if (h.name === "Tank Mert Hoca" && currentTime - h.specialTimer > 10000) {
                    const angle = Math.atan2(player.y - h.y, player.x - h.x);
                    enemyBullets.push({ x: h.x, y: h.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, color: "#c0392b" });
                    h.specialTimer = currentTime;
                }

                let angle = (h.name === "Zeki Emre") ? Math.atan2(player.y+(mouseY-player.y)*0.4 - h.y, player.x+(mouseX-player.x)*0.4 - h.x) : Math.atan2(player.y - h.y, player.x - h.x);
                h.x += Math.cos(angle) * h.speed * speedMult;
                h.y += Math.sin(angle) * h.speed * speedMult;

                mines.forEach((m, mi) => {
                    if(Math.hypot(h.x - m.x, h.y - m.y) < h.size) {
                        createParticles(m.x, m.y, "#ff4757", 35);
                        shakeAmount = 25;
                        mines.splice(mi, 1);
                        die(h);
                        setSubtitle("PATLADI GİTTİ!", "#ff4757", "#ff4757");
                    }
                });

                bullets.forEach((b, bi) => { 
                    if(Math.hypot(b.x - h.x, b.y - h.y) < h.size) { h.hp--; bullets.splice(bi, 1); if(h.hp <= 0) die(h); } 
                });
                if(player.invul <= 0 && Math.hypot(h.x - player.x, h.y - player.y) < player.size + h.size/2) end();
            });

            bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i, 1); });
            enemyBullets.forEach((eb, i) => { 
                eb.x += eb.vx; eb.y += eb.vy; 
                if (player.invul <= 0 && Math.hypot(eb.x - player.x, eb.y - player.y) < player.size + 10) end();
                if(eb.x<0 || eb.x>canvas.width || eb.y<0 || eb.y>canvas.height) enemyBullets.splice(i, 1); 
            });
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
        }

        function die(h) {
            h.dead = true; createParticles(h.x, h.y, h.color, 20); score += 100;
            document.getElementById("score").innerText = score;
            setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.x = Math.random()*canvas.width; h.y = -50; h.specialTimer = Date.now(); h.ghostTimer = Date.now(); h.tpTimer = Date.now(); }, 3000);
        }

        function draw() {
            ctx.save();
            if(shakeAmount > 1) ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // MAYIN ÇİZİMİ (KIRMIZI LED'Lİ)
            mines.forEach(m => {
                // Metalik gövde
                ctx.fillStyle = "#333";
                ctx.beginPath(); ctx.arc(m.x, m.y, 10, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#555"; ctx.lineWidth = 2; ctx.stroke();
                
                // LED (Yanıp sönen)
                let ledFlash = (Math.floor(Date.now() / 500) % 2 === 0);
                if(ledFlash) {
                    ctx.fillStyle = "#ff0000";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#ff0000";
                    ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0; // Gölgeyi sıfırla
                } else {
                    ctx.fillStyle = "#440000";
                    ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, Math.PI*2); ctx.fill();
                }
            });

            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.globalAlpha = 1;

            hunters.forEach(h => {
                if(h.dead) return;
                if (h.name === "Cansu Hoca") {
                    ctx.beginPath(); ctx.arc(h.x, h.y, h.auraRadius, 0, Math.PI*2); ctx.strokeStyle = "rgba(255, 0, 255, 0.2)"; ctx.stroke();
                }
                ctx.globalAlpha = h.isGhost ? 0.0 : 1.0;
                ctx.fillStyle = h.color; ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
                ctx.fillText(h.name, h.x, h.y - h.size/2 - 5);
                ctx.globalAlpha = 1.0;
            });

            bullets.forEach(b => { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x-4, b.y-4, 8, 8); });
            enemyBullets.forEach(eb => { ctx.fillStyle = eb.color; ctx.beginPath(); ctx.arc(eb.x, eb.y, 10, 0, Math.PI*2); ctx.fill(); });
            ctx.fillStyle = player.invul > 0 ? "white" : player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function end() { gameActive = false; document.getElementById("gameOver").style.display = "flex"; }
        function gameLoop() { if(gameActive) { update(); draw(); requestAnimationFrame(gameLoop); } }
    </script>
</body>
</html>
