<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar: Multi-Platform</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; transition: background 1s; }
        canvas { display: block; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center; }
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #3498db; border: none; color: white; font-weight: bold; border-radius: 10px; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); }
        .btn.mobile { background: #e67e22; }

        /* Mobil Kontroller */
        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 50; pointer-events: none; }
        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; pointer-events: auto; }
        .joystick-stick { width: 60px; height: 60px; background: rgba(0, 210, 255, 0.5); border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        .fire-btn { width: 100px; height: 100px; background: rgba(231, 76, 60, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }

        .ui-container { position: absolute; top: 10px; left: 10px; z-index: 5; pointer-events: none; }
        .stats { font-size: 16px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        #warning-overlay { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 40px; color: #ff4757; font-weight: bold; display: none; z-index: 60; }
    </style>
</head>
<body>

    <div id="startScreen" class="overlay">
        <h1 style="color:#00d2ff">RÜZGAR'IN İNTİKAMI</h1>
        <p>Cihazınızı Seçin:</p>
        <div class="btn-group">
            <button class="btn" onclick="initGame('pc')">BİLGİSAYAR</button>
            <button class="btn mobile" onclick="initGame('mobile')">MOBİL</button>
        </div>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757">YAKALANDIN!</h1>
        <p id="finalScore" style="font-size: 25px;"></p>
        <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
    </div>

    <div id="mobile-controls">
        <div id="joyBase" class="joystick-base"><div id="joyStick" class="joystick-stick"></div></div>
        <div class="fire-btn" id="fireBtn">ATEŞ!</div>
    </div>

    <div id="warning-overlay">HAREKET ETME!</div>

    <div class="ui-container">
        <div class="stats">
            SKOR: <b id="score">0</b> | LEVEL: <b id="ui-level" style="color:#f1c40f">1</b>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("ui-level");
        const warningEl = document.getElementById("warning-overlay");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let device = 'pc';
        let score = 0;
        let currentLevel = 1;
        let speedMultiplier = 1;
        let isMoving = false;
        let checkActive = false;
        let lastMoveCheck = Date.now();
        
        let bullets = [];
        let activeHunters = [];
        const bgColors = ["#050505", "#1e0b0b", "#0b1e0b", "#0b0b1e", "#1e1e0b"];

        const player = { x: canvas.width/2, y: canvas.height/2, size: 20, vx: 0, vy: 0 };

        const hunterTemplates = [
            { name: "Tank Mert", color: "#c0392b", speed: 0.7, maxHp: 3, type: 'tank', size: 45 },
            { name: "Görünmez Kutay", color: "#ffa502", speed: 2.5, maxHp: 1, type: 'invisible' },
            { name: "Zorba Emre", color: "#8e44ad", speed: 2.3, maxHp: 2, type: 'normal' },
            { name: "Donduran Birce", color: "#ff9ff3", speed: 1.9, maxHp: 2, type: 'frost' },
            { name: "Cansu Hoca", color: "#ffffff", speed: 2.0, maxHp: 2, type: 'teacher' }
        ];

        function initGame(type) {
            device = type;
            document.getElementById("startScreen").style.display = "none";
            if(device === 'mobile') document.getElementById("mobile-controls").style.display = "flex";
            
            activeHunters = hunterTemplates.map(t => ({
                ...t, x: Math.random()*canvas.width, y: -50, hp: t.maxHp, dead: false, 
                size: t.size || 30, lastInvis: Date.now()
            }));

            gameActive = true;
            setInterval(teacherCheck, 30000); // 30 sn'de bir Cansu Hoca kontrolü
            gameLoop();
        }

        function teacherCheck() {
            if(!gameActive) return;
            checkActive = true;
            warningEl.style.display = "block";
            setTimeout(() => {
                if(isMoving && checkActive) gameOverFunc();
                checkActive = false;
                warningEl.style.display = "none";
            }, 2000);
        }

        // --- KONTROLLER ---
        window.addEventListener("mousemove", e => {
            if(gameActive && device === 'pc') {
                isMoving = true;
                player.x = e.clientX; player.y = e.clientY;
                lastMoveCheck = Date.now();
            }
        });

        window.addEventListener("keydown", e => {
            if(gameActive && device === 'pc' && e.key.startsWith("Arrow")) {
                let vx=0, vy=0;
                if(e.key === "ArrowUp") vy=-15; if(e.key === "ArrowDown") vy=15;
                if(e.key === "ArrowLeft") vx=-15; if(e.key === "ArrowRight") vx=15;
                bullets.push({x: player.x, y: player.y, vx, vy});
            }
        });

        // Mobil Joystick Mantığı (Basitleştirilmiş)
        const joyStick = document.getElementById("joyStick");
        document.getElementById("joyBase").addEventListener("touchmove", e => {
            const touch = e.touches[0];
            const base = e.currentTarget.getBoundingClientRect();
            const centerX = base.left + 60;
            const centerY = base.top + 60;
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            player.vx = dx / 10;
            player.vy = dy / 10;
            joyStick.style.transform = `translate(${dx/2}px, ${dy/2}px)`;
            isMoving = true; lastMoveCheck = Date.now();
        });

        document.getElementById("fireBtn").addEventListener("touchstart", () => {
            if(gameActive) bullets.push({x: player.x, y: player.y, vx: 0, vy: -15});
        });

        function update() {
            const now = Date.now();
            if(now - lastMoveCheck > 100) isMoving = false;

            if(device === 'mobile') {
                player.x += player.vx;
                player.y += player.vy;
            }

            activeHunters.forEach(h => {
                if(h.dead) return;
                
                // Görünmezlik
                if(h.type === 'invisible') h.opacity = ((now - h.lastInvis) % 4000 < 2000) ? 0 : 1;

                const angle = Math.atan2(player.y - h.y, player.x - h.x);
                h.x += Math.cos(angle) * (h.speed * speedMultiplier);
                h.y += Math.sin(angle) * (h.speed * speedMultiplier);

                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x - h.x, b.y - h.y) < h.size) {
                        h.hp--; bullets.splice(bi, 1);
                        if(h.hp <= 0) {
                            h.dead = true; score += 100;
                            // LEVEL UP KONTROLÜ
                            if(score % 500 === 0) {
                                currentLevel++;
                                speedMultiplier += 0.3;
                                levelEl.innerText = currentLevel;
                                document.body.style.background = bgColors[currentLevel % bgColors.length];
                            }
                            scoreEl.innerText = score;
                            setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -50; }, 3000);
                        }
                    }
                });

                if(Math.hypot(h.x - player.x, h.y - player.y) < player.size + h.size/2) gameOverFunc();
            });

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            activeHunters.forEach(h => {
                if(h.dead || h.opacity === 0) return;
                ctx.fillStyle = h.color;
                if(h.type === 'tank') ctx.fillRect(h.x-h.size/2, h.y-h.size/2, h.size, h.size);
                else { ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, Math.PI*2); ctx.fill(); }

                // CAN BARI
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillRect(h.x - 20, h.y - h.size - 10, 40, 5);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(h.x - 20, h.y - h.size - 10, (h.hp / h.maxHp) * 40, 5);
            });

            ctx.fillStyle = "#00d2ff"; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
            bullets.forEach(b => { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x-4, b.y-4, 8, 8); });
        }

        function gameOverFunc() { gameActive = false; document.getElementById("gameOver").style.display = "flex"; document.getElementById("finalScore").innerText = `SKOR: ${score}`; }
        function gameLoop() { if(gameActive) { update(); draw(); requestAnimationFrame(gameLoop); } }
    </script>
</body>
</html>
