<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar'ın İntikamı: v1.23.8</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010101; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 12px; color: rgba(255, 255, 255, 0.4); z-index: 10; font-family: monospace; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 50px; margin: 10px; box-shadow: 0 0 15px #2ecc71; }
        #subtitle-panel { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 750px; background: rgba(0, 0, 0, 0.95); border-left: 5px solid #00d2ff; border-right: 5px solid #00d2ff; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: 900; z-index: 5; color: #fff; text-transform: uppercase; }
        #glitch-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: rgba(0, 255, 0, 0.1); display: none; z-index: 2; border: 4px solid #0f0; mix-blend-mode: overlay; }
        .stats { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid #00d2ff; border-radius: 8px; z-index: 5; }
    </style>
</head>
<body>
    <div id="glitch-fx"></div>
    <div id="version-tag">v1.23.8 | FULL KADRO & TÜM GÜÇLER</div>
    <div class="stats">SKOR: <span id="score">0</span> | MAYIN (Sol Tık): <span id="mine-count">5</span></div>
    
    <div id="startScreen" class="overlay">
        <h1 style="color:#00d2ff; font-size: 45px;">NİHAİ HESAPLAŞMA</h1>
        <p>Ok Tuşları: Ateş | Sol Tık: Mayın | Mouse: Hareket</p>
        <button class="btn" onclick="init()">OYUNU BAŞLAT</button>
    </div>
    
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; font-size: 60px;">PAKET OLDUN!</h1>
        <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
    </div>

    <div id="subtitle-panel">SİSTEM AKTİF...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const subtitle = document.getElementById("subtitle-panel");
        const glitchFx = document.getElementById("glitch-fx");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, ammoReload = 100, mouseX = 0, mouseY = 0;
        let bullets = [], particles = [], hunters = [], enemyBullets = [], mines = [], revControls = false;

        const player = { x: canvas.width/2, y: canvas.height/2, size: 20, color: "#00d2ff", name: "RÜZGAR", debuff: 1 };

        const templates = [
            { name: "Mert Hoca", color: "#c0392b", speed: 0.6, maxHp: 3, size: 60, type: "gama", q: "GAMA IŞINI!" },
            { name: "Çağan", color: "#00ff00", speed: 2.4, maxHp: 1, size: 32, type: "hacker", q: "SİSTEM HACKLENDİ!" },
            { name: "Çağhan", color: "#9b59b6", speed: 1.2, maxHp: 2, size: 70, type: "susanoo", q: "SUSANOO!" },
            { name: "Ali", color: "#5352ed", speed: 1.6, maxHp: 1, size: 28, type: "tp", q: "YAKALAYAMAZSIN!" },
            { name: "Cansu Hoca", color: "#ff00ff", speed: 2.0, maxHp: 1, size: 35, type: "slow", q: "DİSİPLİN!" },
            { name: "Kutay", color: "#ffa502", speed: 2.2, maxHp: 1, size: 30, type: "invis", q: "NEREDEYİM?" }
        ];

        function setSubtitle(t, c="#fff") { subtitle.innerText = t; subtitle.style.color = c; }

        function init() {
            document.getElementById("startScreen").style.display = "none";
            hunters = templates.map(t => ({ 
                ...t, x: Math.random()*canvas.width, y: -50, hp: t.maxHp, 
                dead: false, specT: Date.now(), quoteT: 0, shield: false, invis: false
            }));
            gameActive = true;
            gameLoop();
        }

        window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener("mousedown", e => { 
            if(gameActive && e.button === 0 && mines.length < 5) {
                mines.push({x: player.x, y: player.y});
                setSubtitle("RÜZGAR: MAYIN DÖŞENDİ!", "#00d2ff");
            }
        });

        window.addEventListener("keydown", e => {
            if(!gameActive || ammoReload < 100) return;
            let vx = 0, vy = 0, mult = revControls ? -1 : 1;
            if(e.key === "ArrowUp") vy = -15 * mult; else if(e.key === "ArrowDown") vy = 15 * mult;
            else if(e.key === "ArrowLeft") vx = -15 * mult; else if(e.key === "ArrowRight") vx = 15 * mult;
            if(vx !== 0 || vy !== 0) { bullets.push({ x: player.x, y: player.y, vx, vy }); ammoReload = 0; }
        });

        function createParticles(x, y, color) {
            for(let i=0; i<12; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
        }

        function gameLoop() {
            if(!gameActive) return;
            const now = Date.now();
            player.x += (mouseX - player.x) * (0.12 * player.debuff);
            player.y += (mouseY - player.y) * (0.12 * player.debuff);
            player.debuff = 1;
            if(ammoReload < 100) ammoReload += 7;
            document.getElementById("mine-count").innerText = 5 - mines.length;

            hunters.forEach(h => {
                if(h.dead) return;
                if(h.quoteT > 0) h.quoteT--;

                // --- GÜÇLERİN DÖNÜŞÜ ---
                if(h.type === "hacker" && now - h.specT > 12000) {
                    h.quoteT = 100; h.activeQ = h.q; revControls = true; glitchFx.style.display = "block";
                    h.specT = now; setTimeout(() => { revControls = false; glitchFx.style.display = "none"; }, 3000);
                }
                if(h.type === "gama" && now - h.specT > 10000) {
                    const a = Math.atan2(player.y-h.y, player.x-h.x);
                    enemyBullets.push({x:h.x, y:h.y, vx:Math.cos(a)*8, vy:Math.sin(a)*8});
                    h.specT = now; h.quoteT = 80; h.activeQ = h.q;
                }
                if(h.type === "susanoo" && now - h.specT > 8000) {
                    h.shield = true; h.quoteT = 80; h.activeQ = h.q;
                    h.specT = now; setTimeout(() => h.shield = false, 3500);
                }
                if(h.type === "tp" && now - h.specT > 6000) {
                    h.x = player.x + (Math.random()-0.5)*400; h.y = player.y + (Math.random()-0.5)*400;
                    h.specT = now; h.quoteT = 60; h.activeQ = h.q;
                }
                if(h.type === "invis" && now - h.specT > 10000) {
                    h.invis = true; h.quoteT = 60; h.activeQ = h.q;
                    if(now - h.specT > 13000) { h.invis = false; h.specT = now; }
                }
                if(h.type === "slow" && Math.hypot(player.x-h.x, player.y-h.y) < 160) player.debuff = 0.5;

                const angle = Math.atan2(player.y-h.y, player.x-h.x);
                h.x += Math.cos(angle) * h.speed; h.y += Math.sin(angle) * h.speed;

                // Çarpışma: Oyuncu
                if(!h.invis && Math.hypot(h.x-player.x, h.y-player.y) < player.size + h.size/2) {
                    gameActive = false; document.getElementById("gameOver").style.display = "flex";
                }
                
                // Çarpışma: Mayın
                mines.forEach((m, mi) => {
                    if(Math.hypot(h.x-m.x, h.y-m.y) < h.size/2) {
                        mines.splice(mi, 1); h.hp -= 3;
                        if(h.hp <= 0) {
                            h.dead = true; createParticles(h.x, h.y, h.color);
                            score += 500; setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -50; }, 4000);
                        }
                    }
                });
            });

            // Mermiler
            bullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                hunters.forEach(h => {
                    if(!h.dead && !h.shield && Math.hypot(b.x-h.x, b.y-h.y) < h.size/2) {
                        bullets.splice(bi, 1); h.hp--;
                        if(h.hp <= 0) {
                            h.dead = true; createParticles(h.x, h.y, h.color);
                            score += 200; setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -50; }, 3000);
                        }
                    }
                });
            });

            enemyBullets.forEach(eb => { eb.x += eb.vx; eb.y += eb.vy; if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) gameActive = false; });
            particles.forEach((p, i) => { p.x+=p.vx; p.y+=p.vy; p.life-=0.02; if(p.life<=0) particles.splice(i,1); });

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            mines.forEach(m => {
                ctx.fillStyle="#444"; ctx.beginPath(); ctx.arc(m.x, m.y, 10, 0, 7); ctx.fill();
                ctx.fillStyle=(Math.floor(Date.now()/500)%2===0)?"#f00":"#400";
                ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, 7); ctx.fill();
            });

            hunters.forEach(h => {
                if(h.dead) return;
                ctx.globalAlpha = h.invis ? 0.1 : 1;
                if(h.shield) { ctx.strokeStyle = h.color; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2+10, 0, 7); ctx.stroke(); }
                ctx.fillStyle = h.color; ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, 7); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
                ctx.fillText(h.name, h.x, h.y - h.size/2 - 10);
                if(h.quoteT > 0) ctx.fillText(h.activeQ, h.x, h.y - h.size/2 - 30);
                ctx.globalAlpha = 1;
            });

            bullets.forEach(b => { ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill(); });
            enemyBullets.forEach(eb => { ctx.fillStyle="#f00"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 8, 0, 7); ctx.fill(); });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            
            ctx.globalAlpha = 1;
            ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, 7); ctx.fill();
            ctx.fillStyle = "white"; ctx.fillText(player.name, player.x, player.y - 30);
            document.getElementById("score").innerText = score;
        }
    </script>
</body>
</html>
