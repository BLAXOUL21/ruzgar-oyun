<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rüzgar: Ciddiyet Lütfen!</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; color: white; transition: background 0.8s; }
        canvas { display: block; cursor: crosshair; }
        .ui-container { position: absolute; top: 10px; left: 10px; z-index: 5; pointer-events: none; }
        .stats { font-size: 18px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; border: 1px solid #444; }
        #subtitle-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(0, 0, 0, 0.7);
            border-top: 2px solid #00d2ff; padding: 10px; border-radius: 10px;
            text-align: center; font-size: 22px; font-weight: bold; min-height: 35px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); pointer-events: none;
        }
        #warning-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; color: #ff4757; font-weight: bold; display: none; text-shadow: 0 0 20px red;
            z-index: 20; pointer-events: none;
        }
        .ammo-bar { display: flex; gap: 5px; margin-top: 10px; align-items: center; }
        .ammo-slot { width: 30px; height: 10px; background: #222; border: 1px solid #555; border-radius: 3px; overflow: hidden; }
        .ammo-fill { height: 100%; background: #00d2ff; width: 0%; }
        .ammo-ready { background: #f1c40f; box-shadow: 0 0 8px #f1c40f; width: 100% !important; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 50px; }
    </style>
</head>
<body>

    <div id="startScreen" class="overlay">
        <h1>RÜZGAR'IN İNTİKAMI</h1>
        <p>Cansu Hoca 30 saniyede bir kontrol eder: <b>HAREKET ETME!</b></p>
        <button class="btn" onclick="startGame()">SAVAŞI BAŞLAT</button>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757">YAKALANDIN!</h1>
        <p id="finalScore" style="font-size: 25px;"></p>
        <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
    </div>

    <div id="warning-overlay">HAREKET ETME!</div>

    <div class="ui-container">
        <div class="stats">
            SKOR: <b id="score">0</b> | LEVEL: <b id="ui-level" style="color:#f1c40f">1</b><br>
            MAYIN: <b id="mineCount">5</b>
        </div>
        <div class="ammo-bar">
            <div id="slot0" class="ammo-slot"><div class="ammo-fill"></div></div>
            <div id="slot1" class="ammo-slot"><div class="ammo-fill"></div></div>
            <div id="slot2" class="ammo-slot"><div class="ammo-fill"></div></div>
        </div>
    </div>

    <div id="subtitle-panel">Hazır mısın Rüzgar?</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const warningEl = document.getElementById("warning-overlay");
        const scoreEl = document.getElementById("score");
        const subtitlePanel = document.getElementById("subtitle-panel");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false;
        let score = 0;
        let speedMultiplier = 1;
        let isMoving = false;
        let checkActive = false;
        let bullets = [];
        let enemyBullets = [];
        let mines = [];
        let lastMoveTime = Date.now();

        const player = { x: canvas.width/2, y: canvas.height/2, size: 20 };
        const ammoSlots = [{ready:true, last:0}, {ready:true, last:0}, {ready:true, last:0}];

        const hunterTemplates = [
            { name: "Tank Mert", color: "#c0392b", speed: 0.8, maxHp: 3, type: 'tank', size: 45 },
            { name: "Görünmez Kutay", color: "#ffa502", speed: 2.7, maxHp: 1, type: 'invisible' },
            { name: "Işınlanan Ali", color: "#5352ed", speed: 2.2, maxHp: 1, type: 'teleport' },
            { name: "Zorba Emre", color: "#8e44ad", speed: 2.5, maxHp: 3, type: 'normal' },
            { name: "Donduran Birce", color: "#ff9ff3", speed: 2.1, maxHp: 2, type: 'frost' },
            { name: "Cansu Hoca", color: "#ffffff", speed: 2.1, maxHp: 2, type: 'teacher' }
        ];

        let activeHunters = [];

        function startGame() {
            document.getElementById("startScreen").style.display = "none";
            gameActive = true;
            activeHunters = hunterTemplates.map(t => ({
                ...t, x: Math.random()*canvas.width, y: -50, hp: t.maxHp, dead: false, size: t.size || 30, lastShot: Date.now()
            }));
            setInterval(teacherCheck, 30000); // 30 Saniyede bir kontrol
            gameLoop();
        }

        function teacherCheck() {
            if(!gameActive) return;
            checkActive = true;
            warningEl.style.display = "block";
            subtitlePanel.innerText = "Cansu Hoca: Ciddiyet lütfen! Kim o hareket eden?";
            
            setTimeout(() => {
                if(isMoving && checkActive) gameOver(); // Eğer 2 saniye sonra hala hareket ediyorsa
                checkActive = false;
                warningEl.style.display = "none";
            }, 2000);
        }

        window.addEventListener("mousemove", e => {
            if(gameActive) {
                isMoving = true;
                player.x = e.clientX; player.y = e.clientY;
                lastMoveTime = Date.now();
            }
        });

        function update() {
            const now = Date.now();
            if(now - lastMoveTime > 100) isMoving = false;

            activeHunters.forEach(h => {
                if(h.dead) return;
                
                // Takip mantığı
                const angle = Math.atan2(player.y - h.y, player.x - h.x);
                h.x += Math.cos(angle) * (h.speed * speedMultiplier);
                h.y += Math.sin(angle) * (h.speed * speedMultiplier);

                // Çatışma
                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x - h.x, b.y - h.y) < h.size) {
                        h.hp--;
                        bullets.splice(bi, 1);
                        if(h.hp <= 0) {
                            h.dead = true; score += 100; scoreEl.innerText = score;
                            setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -50; }, 3000);
                        }
                    }
                });

                if(Math.hypot(h.x - player.x, h.y - player.y) < player.size + h.size/2) gameOver();
            });

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            activeHunters.forEach(h => {
                if(h.dead) return;
                ctx.fillStyle = h.color;
                if(h.type === 'tank') ctx.fillRect(h.x-h.size/2, h.y-h.size/2, h.size, h.size);
                else { ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, Math.PI*2); ctx.fill(); }

                // --- CAN BARI ÇİZİMİ ---
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillRect(h.x - 20, h.y - h.size - 5, 40, 5);
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(h.x - 20, h.y - h.size - 5, (h.hp / h.maxHp) * 40, 5);
                
                ctx.fillStyle = "white"; ctx.fillText(h.name, h.x - 15, h.y + h.size + 5);
            });

            ctx.fillStyle = "#00d2ff"; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
            bullets.forEach(b => { ctx.fillStyle = "#f1c40f"; ctx.fillRect(b.x-4, b.y-4, 8, 8); });
        }

        function gameOver() { gameActive = false; document.getElementById("gameOver").style.display = "flex"; }
        function gameLoop() { if(gameActive) { update(); draw(); requestAnimationFrame(gameLoop); } }

        window.addEventListener("keydown", e => {
            const slot = ammoSlots.findIndex(s => s.ready);
            if(e.key.startsWith("Arrow") && slot !== -1) {
                let vx=0, vy=0;
                if(e.key === "ArrowUp") vy=-15; if(e.key === "ArrowDown") vy=15;
                if(e.key === "ArrowLeft") vx=-15; if(e.key === "ArrowRight") vx=15;
                bullets.push({x: player.x, y: player.y, vx, vy});
                ammoSlots[slot].ready = false;
                setTimeout(() => { ammoSlots[slot].ready = true; }, 1500);
            }
        });
    </script>
</body>
</html>
