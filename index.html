<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar'ın İntikamı: v1.24.1 (Full Realistic Fix)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Courier New', monospace; color: white; touch-action: none; }
        canvas { display: block; }
        .hud { position: absolute; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid #00d2ff; border-radius: 5px; font-weight: bold; pointer-events: none; z-index: 10; }
        .score-box { top: 10px; left: 10px; box-shadow: 0 0 10px rgba(0,210,255,0.3); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 100; text-align: center; }
        .btn { padding: 20px 60px; font-size: 28px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 5px; transition: 0.3s; box-shadow: 0 5px 0 #27ae60; }
        .btn:hover { background: #27ae60; transform: translateY(-2px); }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        #glitch-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; pointer-events: none; border: 5px solid #0f0; opacity: 0.2; }
    </style>
</head>
<body>
    <div id="glitch-fx"></div>
    <div class="hud score-box">SKOR: <span id="score">0</span></div>
    
    <div id="startScreen" class="overlay">
        <h1 style="color:#00d2ff; font-size: 50px; text-shadow: 0 0 20px #00d2ff;">RÜZGAR: İNTİKAM</h1>
        <p style="color: #888;">Gerçekçi Mekanikler ve HD Grafikler Aktif</p>
        <button class="btn" onclick="init()">BAĞLANTIYI KUR</button>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; font-size: 60px;">SİSTEM ÇÖKTÜ</h1>
        <button class="btn" style="background:#ff4757; box-shadow: 0 5px 0 #c0392b;" onclick="location.reload()">REBOOT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, ammoReload = 100;
        let mouseX = canvas.width/2, mouseY = canvas.height/2;
        let bullets = [], particles = [], hunters = [], revControls = false;

        const player = { x: canvas.width/2, y: canvas.height/2, size: 25, color: "#00d2ff" };

        const enemies = [
            { name: "Mert Hoca", color: "#c0392b", speed: 0.8, hp: 3, size: 70, type: "tank" },
            { name: "Çağan", color: "#2ecc71", speed: 2.6, hp: 1, size: 35, type: "hacker" },
            { name: "Çağhan", color: "#8e44ad", speed: 1.4, hp: 2, size: 85, type: "armor" },
            { name: "Ali", color: "#2980b9", speed: 1.8, hp: 1, size: 32, type: "tp" },
            { name: "Cansu Hoca", color: "#e84393", speed: 2.2, hp: 1, size: 40, type: "slow" },
            { name: "Kutay", color: "#d35400", speed: 2.4, hp: 1, size: 38, type: "ghost" }
        ];

        function init() {
            document.getElementById("startScreen").style.display = "none";
            hunters = enemies.map(e => ({
                ...e, x: Math.random()*canvas.width, y: -100,
                maxHp: e.hp, dead: false, specT: Date.now(), shield: false
            }));
            gameActive = true;
            loop();
        }

        window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener("keydown", e => {
            if(!gameActive || ammoReload < 100) return;
            let vx = 0, vy = 0, m = revControls ? -1 : 1;
            if(e.key === "ArrowUp") vy = -18 * m; else if(e.key === "ArrowDown") vy = 18 * m;
            else if(e.key === "ArrowLeft") vx = -18 * m; else if(e.key === "ArrowRight") vx = 18 * m;
            if(vx !== 0 || vy !== 0) { bullets.push({x: player.x, y: player.y, vx, vy}); ammoReload = 0; }
        });

        function drawMetalBall(x, y, size, color, name) {
            // Gölge
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.beginPath(); ctx.arc(x+5, y+5, size/2, 0, 7); ctx.fill();

            // Gövde
            const grad = ctx.createRadialGradient(x-size/4, y-size/4, size/10, x, y, size);
            grad.addColorStop(0, "#fff");
            grad.addColorStop(0.2, color);
            grad.addColorStop(1, "#000");
            
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(x, y, size/2, 0, 7); ctx.fill();
            
            // İsim etiketi
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(name, x, y - size/2 - 10);
        }

        function loop() {
            if(!gameActive) return;
            ctx.fillStyle = "#111"; // Zemin rengi
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Hareket
            player.x += (mouseX - player.x) * 0.15;
            player.y += (mouseY - player.y) * 0.15;
            if(ammoReload < 100) ammoReload += 10;

            // Oyuncu Çizimi
            drawMetalBall(player.x, player.y, player.size*2, player.color, "RÜZGAR");

            // Düşmanlar
            hunters.forEach(h => {
                if(h.dead) return;
                const angle = Math.atan2(player.y-h.y, player.x-h.x);
                h.x += Math.cos(angle) * h.speed; h.y += Math.sin(angle) * h.speed;

                // Yetenekler
                const now = Date.now();
                if(h.type === "hacker" && now - h.specT > 10000) {
                    revControls = true; document.getElementById("glitch-fx").style.display = "block";
                    h.specT = now; setTimeout(() => { revControls = false; document.getElementById("glitch-fx").style.display = "none"; }, 3000);
                }
                if(h.type === "armor" && now - h.specT > 8000) {
                    h.shield = true; h.specT = now; setTimeout(() => h.shield = false, 4000);
                }

                // Kalkan Çizimi
                if(h.shield) {
                    ctx.strokeStyle = "#a55eea"; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2 + 15, 0, 7); ctx.stroke();
                }

                drawMetalBall(h.x, h.y, h.size, h.color, h.name);

                if(Math.hypot(h.x-player.x, h.y-player.y) < player.size + h.size/2) {
                    gameActive = false; document.getElementById("gameOver").style.display = "flex";
                }
            });

            // Mermiler
            bullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                ctx.fillStyle = "#f1c40f";
                ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill();
                
                hunters.forEach(h => {
                    if(!h.dead && !h.shield && Math.hypot(b.x-h.x, b.y-h.y) < h.size/2) {
                        bullets.splice(bi, 1); h.hp--;
                        if(h.hp <= 0) {
                            h.dead = true; score += 100;
                            setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -100; }, 3000);
                        }
                    }
                });
            });

            document.getElementById("score").innerText = score;
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
