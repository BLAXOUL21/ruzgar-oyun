<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar'ın İntikamı: v1.23.7</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010101; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 12px; color: rgba(255, 255, 255, 0.4); pointer-events: none; z-index: 10; font-family: monospace; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 50px; margin: 10px; box-shadow: 0 0 15px #2ecc71; transition: 0.3s; }
        #subtitle-panel { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 750px; background: rgba(0, 0, 0, 0.95); border-left: 5px solid #00d2ff; border-right: 5px solid #00d2ff; padding: 20px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: 900; z-index: 5; color: #fff; text-transform: uppercase; border-top: 1px solid #333; }
        #glitch-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: rgba(0, 255, 0, 0.05); display: none; z-index: 2; border: 2px solid #0f0; }
    </style>
</head>
<body>
    <div id="glitch-fx"></div>
    <div id="version-tag">v1.23.7 | ÇAĞAN: SİBER KORSAN</div>
    <div id="startScreen" class="overlay">
        <h1 style="color:#00d2ff; font-size: 45px;">RÜZGAR'IN İNTİKAMI</h1>
        <p>Çağan Sistemlerini Hackleyebilir!</p>
        <button class="btn" onclick="init()">GİRİŞ YAP</button>
    </div>
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; font-size: 60px;">BAĞLANTI KESİLDİ!</h1>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
    <div id="subtitle-panel">SİSTEM YÜKLENİYOR...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const subtitle = document.getElementById("subtitle-panel");
        const glitchFx = document.getElementById("glitch-fx");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, ammoReload = 100, mouseX = 0, mouseY = 0;
        let bullets = [], hunters = [], enemyBullets = [], reverseControls = false;

        const player = { x: canvas.width/2, y: canvas.height/2, size: 20, color: "#00d2ff", name: "RÜZGAR" };

        const templates = [
            { name: "Mert Hoca", color: "#c0392b", speed: 0.6, maxHp: 3, size: 60, type: "gama", q: "Gama Işını!" },
            { name: "Çağan", color: "#00ff00", speed: 2.4, maxHp: 1, size: 32, type: "hacker", q: "ERİŞİM SAĞLANDI!" },
            { name: "Çağhan", color: "#9b59b6", speed: 1.2, maxHp: 2, size: 70, type: "susanoo", q: "SUSANOO!" },
            { name: "Kutay", color: "#ffa502", speed: 2.2, maxHp: 1, size: 30, type: "invis", q: "Sessizce..." },
            { name: "Ali", color: "#5352ed", speed: 1.6, maxHp: 1, size: 28, type: "tp", q: "Işınlandım!" },
            { name: "Cansu Hoca", color: "#ff00ff", speed: 2.0, maxHp: 1, size: 32, aura: 150, type: "slow", q: "Disiplin!" }
        ];

        function setSubtitle(t, c="#fff") { subtitle.innerText = t; subtitle.style.color = c; }

        function init() {
            document.getElementById("startScreen").style.display = "none";
            hunters = templates.map(t => ({ 
                ...t, x: Math.random()*canvas.width, y: -50, hp: t.maxHp, 
                dead: false, specT: Date.now(), quoteTimer: 0, shieldActive: false
            }));
            gameActive = true;
            gameLoop();
        }

        window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
        
        window.addEventListener("keydown", e => {
            if(!gameActive || ammoReload < 100) return;
            let vx = 0, vy = 0;
            const mult = reverseControls ? -1 : 1; // Çağan'ın hack gücü burada devreye giriyor

            if(e.key === "ArrowUp") vy = -15 * mult; 
            else if(e.key === "ArrowDown") vy = 15 * mult;
            else if(e.key === "ArrowLeft") vx = -15 * mult; 
            else if(e.key === "ArrowRight") vx = 15 * mult;

            if(vx !== 0 || vy !== 0) { bullets.push({ x: player.x, y: player.y, vx, vy }); ammoReload = 0; }
        });

        function triggerQuote(h, text) { h.activeQuote = text; h.quoteTimer = 80; setSubtitle(`${h.name.toUpperCase()}: ${text}`, h.color); }

        function gameLoop() {
            if(!gameActive) return;
            const now = Date.now();
            
            player.x += (mouseX - player.x) * 0.12;
            player.y += (mouseY - player.y) * 0.12;
            if(ammoReload < 100) ammoReload += 6;

            hunters.forEach(h => {
                if(h.dead) return;
                if(h.quoteTimer > 0) h.quoteTimer--;

                // --- ÇAĞAN: HACK GÜCÜ ---
                if(h.type === "hacker" && now - h.specT > 12000) {
                    triggerQuote(h, "SİSTEM HACKLENDİ!");
                    glitchFx.style.display = "block"; reverseControls = true;
                    h.specT = now;
                    setTimeout(() => { glitchFx.style.display = "none"; reverseControls = false; }, 3000);
                }

                // --- DİĞER GÜÇLER ---
                if(h.type === "susanoo" && now - h.specT > 8000) {
                    h.shieldActive = true; triggerQuote(h, "KALKAN AKTİF!");
                    h.specT = now; setTimeout(() => { h.shieldActive = false; }, 3500);
                }
                if(h.type === "gama" && now - h.specT > 10000) {
                    const a = Math.atan2(player.y-h.y, player.x-h.x);
                    enemyBullets.push({x:h.x, y:h.y, vx:Math.cos(a)*9, vy:Math.sin(a)*9});
                    h.specT = now; triggerQuote(h, h.q);
                }

                const a = Math.atan2(player.y-h.y, player.x-h.x);
                h.x += Math.cos(a) * h.speed; h.y += Math.sin(a) * h.speed;

                if(Math.hypot(h.x-player.x, h.y-player.y) < player.size + h.size/2) {
                    gameActive = false; document.getElementById("gameOver").style.display = "flex";
                }
            });

            bullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                hunters.forEach(h => {
                    if(!h.dead && Math.hypot(b.x-h.x, b.y-h.y) < h.size/2) {
                        if(h.shieldActive) return;
                        bullets.splice(bi, 1); h.hp--;
                        if(h.hp <= 0) {
                            h.dead = true; setSubtitle(`${h.name}: DEVRE DIŞI!`, h.color);
                            setTimeout(() => { h.dead = false; h.hp = h.maxHp; h.y = -50; }, 4000);
                        }
                    }
                });
            });

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hunters.forEach(h => {
                if(!h.dead) {
                    if(h.shieldActive) { ctx.strokeStyle = h.color; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2 + 10, 0, 7); ctx.stroke(); }
                    ctx.fillStyle = h.color; ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, 7); ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
                    ctx.fillText(h.name, h.x, h.y - h.size/2 - 10);
                    if(h.quoteTimer > 0) ctx.fillText(h.activeQuote, h.x, h.y - h.size/2 - 30);
                }
            });
            bullets.forEach(b => { ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill(); });
            enemyBullets.forEach(eb => { ctx.fillStyle="#ff0000"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 8, 0, 7); ctx.fill(); });
            ctx.fillStyle = player.color; ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, 7); ctx.fill();
            ctx.fillStyle = "white"; ctx.fillText(player.name, player.x, player.y - 30);
        }
    </script>
</body>
</html>
