<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rüzgar'ın İntikamı: v1.24.0 (Realistic)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 15px; background: rgba(0,0,0,0.6); border: 2px solid #333; border-radius: 8px; font-weight: 900; color: #fff; text-shadow: 0 0 5px #000; }
        .score-box { top: 10px; left: 10px; border-left: 4px solid #00d2ff; }
        #subtitle-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; text-align: center; font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #000; text-transform: uppercase; }
        #glitch-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; pointer-events: none; background: rgba(0,255,0,0.05); border: 4px solid #0f0; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); z-index: 100; text-align: center; }
        .btn { padding: 15px 50px; font-size: 24px; cursor: pointer; background: transparent; border: 2px solid #2ecc71; color: #2ecc71; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div id="glitch-fx"></div>
    <div id="ui-layer">
        <div class="hud score-box">SKOR: <span id="score">0</span></div>
        <div id="subtitle-panel">BAĞLANTI KURULDU...</div>
    </div>
    <div id="startScreen" class="overlay">
        <h1 style="color:#00d2ff; font-size: 60px;">RÜZGAR</h1>
        <h2 style="color: #fff; letter-spacing: 10px;">İNTİKAM</h2>
        <button class="btn" onclick="init()">MEVZU BAŞLASIN</button>
    </div>
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color:#ff4757; font-size: 70px;">BAĞLANTI KESİLDİ</h1>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = false, score = 0, ammoReload = 100, mouseX = canvas.width/2, mouseY = canvas.height/2;
        let bullets = [], particles = [], hunters = [], enemyBullets = [], mines = [], revControls = false;

        // Gerçekçi Dokular (Düz renk yerine metalik gradyanlar ve desenler)
        const TEXTURES = {
            player: {
                main: createGradient("#009acd", "#00d2ff"),
                highlight: "#fff"
            },
            mert: {
                main: createGradient("#8b0000", "#ff4757"),
                highlight: "#333", // Çizik izleri için
                pattern: "tank"
            },
            cagan: {
                main: createGradient("#006400", "#2ecc71"),
                highlight: "#0f0", // Dijital kodlar için
                pattern: "hacker"
            },
            caghan: {
                main: createGradient("#663399", "#a55eea"),
                highlight: "#fff",
                pattern: "armor"
            },
            ali: {
                main: createGradient("#00008b", "#45aaf2"),
                highlight: "#fff"
            },
            cansu: {
                main: createGradient("#c71585", "#fd79a8"),
                highlight: "#fff",
                pattern: "fabric"
            },
            kutay: {
                main: createGradient("#ff8c00", "#fa8231"),
                highlight: "#fff",
                pattern: "ghost"
            }
        };

        function createGradient(c1, c2) {
            const grad = ctx.createLinearGradient(0, -50, 0, 50);
            grad.addColorStop(0, c1);
            grad.addColorStop(1, c2);
            return grad;
        }

        const player = { x: canvas.width/2, y: canvas.height/2, size: 24 };

        const templates = [
            { name: "Mert Hoca", tex: TEXTURES.mert, speed: 0.7, maxHp: 3, size: 70, type: "gama" },
            { name: "Çağan", tex: TEXTURES.cagan, speed: 2.5, maxHp: 1, size: 34, type: "hacker" },
            { name: "Çağhan", tex: TEXTURES.caghan, speed: 1.3, maxHp: 2, size: 80, type: "susanoo" },
            { name: "Ali", tex: TEXTURES.ali, speed: 1.7, maxHp: 1, size: 30, type: "tp" },
            { name: "Cansu Hoca", tex: TEXTURES.cansu, speed: 2.1, maxHp: 1, size: 38, type: "slow" },
            { name: "Kutay", tex: TEXTURES.kutay, speed: 2.3, maxHp: 1, size: 35, type: "invis" }
        ];

        function init() {
            document.getElementById("startScreen").style.display = "none";
            hunters = templates.map(t => ({ 
                ...t, x: Math.random()*canvas.width, y: -100, hp: t.maxHp, 
                dead: false, specT: Date.now(), quoteT: 0, shield: false, invis: false, angle: 0
            }));
            gameActive = true;
            gameLoop();
        }

        window.addEventListener("mousemove", e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener("keydown", e => {
            if(!gameActive || ammoReload < 100) return;
            let vx = 0, vy = 0, m = revControls ? -1 : 1;
            if(e.key === "ArrowUp") vy = -18 * m; else if(e.key === "ArrowDown") vy = 18 * m;
            else if(e.key === "ArrowLeft") vx = -18 * m; else if(e.key === "ArrowRight") vx = 18 * m;
            if(vx !== 0 || vy !== 0) { bullets.push({ x: player.x, y: player.y, vx, vy, trail: [] }); ammoReload = 0; }
        });

        function createExplosion(x, y, color) {
            for(let i=0; i<25; i++) particles.push({ x, y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18, life: 1, color, size: Math.random()*5+2 });
        }

        // --- GERÇEKÇİ ÇİZİM FONKSİYONLARI ---

        function drawBattleground() {
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,canvas.width,canvas.height);
            // Hafif toz desenleri
            ctx.fillStyle = "rgba(100,100,100,0.02)";
            for(let i=0; i<500; i++) { ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2); }
        }

        function drawCharacterShadow(h) {
            ctx.save();
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.beginPath(); ctx.arc(h.x + 5, h.y + 10, h.size/2, 0, 7); ctx.fill();
            ctx.restore();
        }

        function drawCharacterBody(ctx, h) {
            ctx.fillStyle = h.tex.main;
            ctx.beginPath(); ctx.arc(h.x, h.y, h.size/2, 0, 7); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 2; ctx.stroke();

            // Desen Ekleme
            if(h.tex.pattern === "tank") { // Mert Hoca (Tank): Çizikler
                ctx.strokeStyle = h.tex.highlight; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.moveTo(h.x-20, h.y-10); ctx.lineTo(h.x+20, h.y+10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(h.x+10, h.y-20); ctx.lineTo(h.x-10, h.y+20); ctx.stroke();
                ctx.globalAlpha = 1;
            } else if(h.tex.pattern === "hacker") { // Çağan: Dijital Kodlar
                ctx.fillStyle = h.tex.highlight; ctx.font = "8px Courier"; ctx.globalAlpha = 0.6;
                ctx.fillText("01", h.x-15, h.y); ctx.fillText("101", h.x, h.y+10); ctx.globalAlpha = 1;
            }
        }

        function drawPlayer() {
            ctx.save();
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            ctx.translate(player.x, player.y); ctx.rotate(angle);
            
            // Gerçekçi Metalik Gövde (gradients + highlights)
            ctx.fillStyle = TEXTURES.player.main; ctx.beginPath(); ctx.arc(0, 0, player.size, 0, 7); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = 3; ctx.stroke();
            
            // Highlight (Metal Parlama)
            ctx.fillStyle = TEXTURES.player.highlight; ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.arc(8, -8, player.size/2.5, 0, 7); ctx.fill(); ctx.globalAlpha = 1;
            
            ctx.restore();
        }

        function gameLoop() {
            if(!gameActive) return;
            const now = Date.now();
            ctx.clearRect(0,0,canvas.width, canvas.height);
            drawBattleground();

            // Oyuncu Hareket
            player.x += (mouseX - player.x) * 0.18;
            player.y += (mouseY - player.y) * 0.18;
            if(ammoReload < 100) ammoReload += 10;
            document.getElementById("score").innerText = score;

            // Düşmanlar
            hunters.forEach(h => {
                if(h.dead) return;
                h.angle = Math.atan2(player.y-h.y, player.x-h.x);
                h.x += Math.cos(h.angle) * h.speed; h.y += Math.sin(h.angle) * h.speed;

                // --- GÜÇLER ---
                if(h.type === "hacker" && now - h.specT > 10000) {
                    revControls = true; document.getElementById("glitch-fx").style.display = "block";
                    h.specT = now; setTimeout(() => { revControls = false; document.getElementById("glitch-fx").style.display = "none"; }, 3000);
                }
                if(h.type === "susanoo" && now - h.specT > 8000) { h.shield = true; h.specT = now; setTimeout(() => h.shield = false, 4000); }
                if(h.type === "tp" && now - h.specT > 5000) { createExplosion(h.x, h.y, h.color); h.x = player.x + (Math.random()-0.5)*300; h.y = player.y + (Math.random()-0.5)*300; h.specT = now; }
                if(h.type === "gama" && now - h.specT > 9000) { const a = Math.atan2(player.y-h.y, player.x-h.x); enemyBullets.push({x:h.x, y:h.y, vx:Math.cos(a)*10, vy
